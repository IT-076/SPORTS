<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страхование</title>
    <!-- Подключаем VK Bridge -->
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        /* Важно: если виджет не растягивается, попробуйте задать ему размеры */
        #strahovka-lk-widget { 
            width: 100%; 
            min-height: 500px; /* Например, минимальная высота, чтобы сразу было что-то видно */
            box-sizing: border-box; /* Учитывает padding и border в ширине/высоте */
        }
    </style>
</head>
<body>

    <!-- Ваш виджет -->
    <div id="strahovka-lk-widget"></div>
    <script src="https://strahovka-lk.ru/js/widget.js?partner=2ae60cb6-7d93-4638-a0d6-2f87ede64693"></script>

    <script>
        // Инициализация VK Bridge
        vkBridge.send('VKWebAppInit');

        // Опционально: если виджет не сразу подгружается, 
        // можно добавить слушатель события загрузки, чтобы VK Bridge не мешал
        // document.addEventListener('DOMContentLoaded', () => {
        //     vkBridge.send('VKWebAppInit');
        // });
    </script>
</body>
</html>
